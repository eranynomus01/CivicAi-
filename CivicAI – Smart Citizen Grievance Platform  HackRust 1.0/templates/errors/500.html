<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | CivicAI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #84a98c;
            --primary-dark: #6b8c7a;
            --secondary: #e07a5f;
            --background: #f4f1de;
            --text: #3d405b;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #e8e2d1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .error-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .error-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .error-icon {
            font-size: 120px;
            color: var(--secondary);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        h1 {
            font-size: 80px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 rgba(224, 122, 95, 0.2);
        }
        
        h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
        }
        
        p {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .btn-home {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(132, 169, 140, 0.3);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(132, 169, 140, 0.4);
            color: white;
        }
        
        .btn-refresh {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-refresh:hover {
            background: #c96b51;
            transform: translateY(-3px);
            color: white;
        }
        
        .error-details {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
            border-left: 5px solid var(--secondary);
        }
        
        .error-details p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .error-details i {
            color: var(--secondary);
            width: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1>500</h1>
            <h2>Server Error</h2>
            <p>Something went wrong on our end. We're working to fix it.</p>
            
            <div>
                <a href="/" class="btn-home">
                    <i class="fas fa-home"></i> Home
                </a>
                <button onclick="location.reload()" class="btn-refresh">
                    <i class="fas fa-sync-alt"></i> Try Again
                </button>
            </div>
            
            <div class="error-details">
                <p><i class="fas fa-clock me-2"></i> Time: {{ now.strftime('%Y-%m-%d %H:%M:%S') if now else '' }}</p>
                <p><i class="fas fa-envelope me-2"></i> Contact: support@civicai.com</p>
                <p><i class="fas fa-phone me-2"></i> Helpline: 1800-123-4567</p>
            </div>
        </div>
    </div>
</body>
</html>
