<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied | CivicAI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #84a98c;
            --primary-dark: #6b8c7a;
            --secondary: #e07a5f;
            --background: #f4f1de;
            --text: #3d405b;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #e8e2d1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .error-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .error-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .error-icon {
            font-size: 120px;
            color: var(--secondary);
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        h1 {
            font-size: 80px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 rgba(224, 122, 95, 0.2);
        }
        
        h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
        }
        
        p {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .btn-home {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(132, 169, 140, 0.3);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(132, 169, 140, 0.4);
            color: white;
        }
        
        .btn-login {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            background: #c96b51;
            transform: translateY(-3px);
            color: white;
        }
        
        .lock-icon {
            width: 100px;
            height: 100px;
            background: rgba(224, 122, 95, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            border: 3px solid var(--secondary);
        }
        
        .lock-icon i {
            font-size: 50px;
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="lock-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1>403</h1>
            <h2>Access Denied</h2>
            <p>You don't have permission to access this page.</p>
            
            <div>
                <a href="/" class="btn-home">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/login" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
