<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | CivicAI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #84a98c;
            --primary-dark: #6b8c7a;
            --secondary: #e07a5f;
            --background: #f4f1de;
            --text: #3d405b;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #e8e2d1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .error-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .error-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .error-icon {
            font-size: 120px;
            color: var(--secondary);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 80px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 rgba(224, 122, 95, 0.2);
        }
        
        h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
        }
        
        p {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .btn-home {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(132, 169, 140, 0.3);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(132, 169, 140, 0.4);
            color: white;
        }
        
        .btn-home i {
            margin-right: 8px;
        }
        
        .search-box {
            margin-top: 30px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(132, 169, 140, 0.1);
        }
        
        .search-box button {
            position: absolute;
            right: 5px;
            top: 5px;
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-box button:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }
        
        .help-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .help-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .help-links a:hover {
            background: var(--primary);
            color: white;
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 60px; }
            h2 { font-size: 22px; }
            .error-icon { font-size: 80px; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-map-signs"></i>
            </div>
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> Back to Home
            </a>
            
            <div class="search-box">
                <form action="/search" method="GET">
                    <input type="text" name="q" placeholder="Search CivicAI...">
                    <button type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
            
            <div class="help-links">
                <a href="/"><i class="fas fa-home me-1"></i> Home</a>
                <a href="/dashboard"><i class="fas fa-tachometer-alt me-1"></i> Dashboard</a>
                <a href="/submit-complaint"><i class="fas fa-plus-circle me-1"></i> New Complaint</a>
                <a href="/contact"><i class="fas fa-envelope me-1"></i> Contact</a>
            </div>
        </div>
    </div>
</body>
</html>
